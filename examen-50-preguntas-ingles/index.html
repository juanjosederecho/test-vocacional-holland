<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Examen 50 preguntas ingles</title>
<style>
:root{--ink:#18313f;--muted:#60717d;--teal:#0f766e;--rose:#ef5d7a;--yellow:#f8c537;--blue:#2563eb;--green:#16a34a;--line:#d9e5e8}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Trebuchet MS","Segoe UI",Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 0 0,rgba(248,197,55,.35),transparent 22rem),radial-gradient(circle at 100% 0,rgba(37,99,235,.18),transparent 23rem),linear-gradient(150deg,#f7fbff,#fff7dd 50%,#ecfdf5)}button,input{font:inherit}.app{max-width:760px;min-height:100vh;margin:auto;padding:16px 14px 24px;display:grid;gap:14px}.top{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:10px}.logo{width:48px;height:48px;border-radius:14px;background:#fff;border:2px solid var(--line);display:grid;place-items:center;font-weight:1000;color:var(--teal);box-shadow:0 10px 24px rgba(15,118,110,.14)}h1{font-size:clamp(1.35rem,6vw,2.35rem);line-height:1;margin:0;color:#0b5f59}.sub{margin:3px 0 0;color:var(--muted);font-weight:800}.pill{border:2px solid #f6d36e;background:#fff8dc;border-radius:999px;padding:8px 10px;font-weight:1000;color:#855a05;white-space:nowrap}.panel{background:rgba(255,255,255,.94);border:2px solid rgba(217,229,232,.95);border-radius:8px;box-shadow:0 18px 45px rgba(25,49,63,.16);padding:16px}.start{min-height:calc(100vh - 112px);align-content:center;display:grid;gap:16px}.cloud{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tile{min-height:56px;display:grid;place-items:center;text-align:center;border-radius:8px;padding:6px;font-weight:1000;border:2px solid rgba(24,49,63,.08);background:#f7fbff}.tile:nth-child(2n){background:#fff3f6}.tile:nth-child(3n){background:#ecfdf5}.tile:nth-child(4n){background:#fff8dc}label{font-weight:1000;color:#194557}input{width:100%;border:2px solid #b8d7de;border-radius:8px;background:#fff;padding:15px 14px;font-size:1.08rem;outline:none}input:focus{border-color:var(--teal);box-shadow:0 0 0 4px rgba(15,118,110,.14)}.form{display:grid;gap:12px}.btn{min-height:50px;border:0;border-radius:8px;padding:12px 14px;font-weight:1000;cursor:pointer}.primary{background:var(--teal);color:#fff;box-shadow:0 12px 24px rgba(15,118,110,.22)}.secondary{background:#18313f;color:#fff}.ghost{background:#eef7f8;color:#194557;border:2px solid #cce2e6}.btn:disabled{background:#9ab8b5;box-shadow:none;cursor:not-allowed}.quiz,.result{display:none;gap:14px}.progressLine{display:flex;justify-content:space-between;gap:8px;font-weight:1000;color:#194557}.progress{height:13px;background:#e8f2f4;border-radius:999px;overflow:hidden;border:1px solid #d1e4e8;margin-top:9px}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--yellow),var(--rose));transition:.18s}.prompt{min-height:210px;border:2px solid #c7e7e5;border-radius:8px;background:linear-gradient(135deg,#fff,#f0fdfa);display:grid;place-items:center;text-align:center;padding:18px 12px;overflow:hidden}.icon{width:86px;height:86px;border-radius:24px;background:#fff;border:3px solid #ffdc64;display:grid;place-items:center;font-weight:1000;color:#0b5f59;box-shadow:0 12px 22px rgba(25,49,63,.12);font-size:1.15rem}.kind{color:#57717c;font-size:.9rem;font-weight:1000;text-transform:uppercase;margin-top:8px}.term{font-size:clamp(2rem,10vw,3.6rem);font-weight:1000;color:#143747;line-height:1.03;overflow-wrap:anywhere;margin-top:4px}.eq{width:54px;height:54px;margin:10px auto 0;border-radius:50%;background:var(--yellow);display:grid;place-items:center;font-size:2rem;font-weight:1000;color:#443003}.options{display:grid;gap:10px}.option{width:100%;min-height:58px;border-radius:8px;border:2px solid #d3e2e6;background:#fff;color:var(--ink);display:grid;grid-template-columns:42px 1fr;align-items:center;gap:10px;padding:9px 12px 9px 8px;text-align:left;font-weight:1000;box-shadow:0 8px 18px rgba(24,49,63,.07);cursor:pointer}.letter{width:38px;height:38px;border-radius:50%;background:#eef7f8;color:#24606f;display:grid;place-items:center;font-weight:1000}.option.selected{border-color:var(--teal);background:#e8fffb;box-shadow:0 0 0 4px rgba(15,118,110,.12)}.option.selected .letter{background:var(--teal);color:#fff}.nav{display:grid;grid-template-columns:1fr 1fr;gap:10px}.scorebox{text-align:center;background:linear-gradient(135deg,#e8fffb,#fff8dc);border:2px solid #c7e7e5;border-radius:8px;padding:24px 14px}.score{font-size:clamp(3rem,18vw,6rem);font-weight:1000;color:#0b5f59;line-height:.95}.miniGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.mini{background:#f8fbfc;border:2px solid #e1ecef;border-radius:8px;padding:10px 8px;text-align:center}.mini strong{display:block;font-size:1.2rem}.mini span{font-size:.78rem;color:var(--muted);font-weight:1000}.review{display:grid;gap:8px;max-height:250px;overflow:auto}.row{display:grid;grid-template-columns:38px 1fr;gap:8px;border:2px solid #e4edf0;border-radius:8px;background:#fff;padding:9px;font-weight:800}.mark{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:1000;font-size:.8rem}.ok{background:var(--green)}.bad{background:var(--rose)}.small{color:var(--muted)}.hide{display:none!important}@media(max-width:390px){.cloud{grid-template-columns:repeat(2,1fr)}.miniGrid{grid-template-columns:1fr}.panel{padding:14px}.app{padding-left:12px;padding-right:12px}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div class="brand"><div class="logo">ABC</div><div><h1>Examen de Ingles</h1><p class="sub">50 palabras basicas</p></div></div><div class="pill">20 preguntas</div></header>
<section id="start" class="panel start"><div class="cloud"><div class="tile">Hello</div><div class="tile">Water</div><div class="tile">Teacher</div><div class="tile">Family</div><div class="tile">School</div><div class="tile">Please</div><div class="tile">Apple</div><div class="tile">Friend</div></div><form id="form" class="form"><label for="name">Nombre del alumno</label><input id="name" maxlength="60" autocomplete="name" placeholder="Escribe tu nombre completo" required><button id="startBtn" class="btn primary" type="submit">Comenzar examen</button><button id="contBtn" class="btn secondary hide" type="button">Continuar intento</button></form><p class="small">Al terminar, se mostrara el resultado para enviarlo por WhatsApp al docente.</p></section>
<section id="quiz" class="quiz"><div class="panel"><div class="progressLine"><span id="who"></span><span id="count"></span></div><div class="progress"><div id="bar" class="bar"></div></div></div><article class="panel"><div class="prompt"><div><div id="icon" class="icon"></div><div id="kind" class="kind"></div><div id="term" class="term"></div><div class="eq">=</div></div></div><div id="opts" class="options" style="margin-top:14px"></div></article><div class="nav"><button id="prev" class="btn ghost" type="button">Anterior</button><button id="next" class="btn ghost" type="button">Siguiente</button></div><button id="finish" class="btn primary" type="button" disabled>Finalizar examen</button></section>
<section id="result" class="panel result"><div class="scorebox"><div id="score" class="score"></div><div id="note" style="font-weight:1000;margin-top:8px"></div></div><div class="miniGrid"><div class="mini"><strong id="good"></strong><span>Correctas</span></div><div class="mini"><strong id="bad"></strong><span>Incorrectas</span></div><div class="mini"><strong id="pct"></strong><span>Resultado</span></div></div><button id="wa" class="btn primary" type="button">Enviar al docente por WhatsApp</button><h2 style="font-size:1rem;margin:0;color:#194557">Revision</h2><div id="review" class="review"></div></section>
</main>
<script>
const TEACHER="51900973658",KEY="examen_ingles_50_v4",SIZE=20,LETTERS=["A","B","C","D","E"];
const vocab=[
[1,"I like your dog","Me gusta tu perro","DOG"],[2,"What is your name?","Cual es tu nombre?","?"],[3,"I know","Yo se","OK"],[4,"I am Luis","Yo soy Luis","YO"],[5,"I","Yo","I"],[6,"By","Por","PIN"],[7,"They","Ellos / Ellas","3"],[8,"I like","Me gusta","LIKE"],[9,"To scream","Gritar","LOUD"],[10,"To need","Necesitar","NEED"],[11,"Before","Antes","TIME"],[12,"Find","Buscar / Encontrar","FIND"],[13,"Out","Fuera","OUT"],[14,"The","El / La / Los / Las","THE"],[15,"Come on","Vamos","GO"],[16,"We","Nosotros / Nosotras","WE"],[17,"Our time","Nuestro tiempo","TIME"],[18,"Home","Casa / Hogar","HOME"],[19,"Down","Abajo","DOWN"],[20,"Hurry up","Apurate","RUN"],[21,"And","Y","+"],[22,"You","Tu / Usted","YOU"],[23,"I live in Peru","Yo vivo en Peru","PE"],[24,"I love","Yo amo / Me encanta","LOVE"],[25,"Always","Siempre","*"],[26,"First","Primero","1"],[27,"Tame","Domesticar","PET"],[28,"Hello","Hola","HI"],[29,"Good morning","Buenos dias","AM"],[30,"Good afternoon","Buenas tardes","PM"],[31,"Good night","Buenas noches","NITE"],[32,"Thank you","Gracias","THX"],[33,"Please","Por favor","PLS"],[34,"Yes","Si","YES"],[35,"No","No","NO"],[36,"Water","Agua","H2O"],[37,"Food","Comida","FOOD"],[38,"Bread","Pan","PAN"],[39,"Milk","Leche","MILK"],[40,"Apple","Manzana","APPLE"],[41,"Dog","Perro","DOG"],[42,"Cat","Gato","CAT"],[43,"House","Casa","HOME"],[44,"School","Escuela / Colegio","SCHOOL"],[45,"Teacher","Profesor / Profesora","TEACH"],[46,"Student","Estudiante","STU"],[47,"Book","Libro","BOOK"],[48,"Pencil","Lapiz","PEN"],[49,"Friend","Amigo / Amiga","PAL"],[50,"Family","Familia","FAM"]
].map(x=>({id:x[0],en:x[1],es:x[2],icon:x[3]}));
const byId=new Map(vocab.map(v=>[v.id,v]));let attempt=null,i=0;
const $=s=>document.querySelector(s),show=s=>{start.style.display=s=="start"?"grid":"none";quiz.style.display=s=="quiz"?"grid":"none";result.style.display=s=="result"?"grid":"none"};
function shuffle(a){a=[...a];for(let n=a.length-1;n>0;n--){let j=Math.floor(Math.random()*(n+1));[a[n],a[j]]=[a[j],a[n]]}return a}
function opts(item,field){let correct=item[field];let other=shuffle(vocab.filter(v=>v.id!==item.id).map(v=>v[field]).filter((v,n,a)=>a.indexOf(v)===n&&v!==correct)).slice(0,4);return shuffle([correct,...other])}
function make(name){let chosen=shuffle(vocab).slice(0,SIZE);return{name,startedAt:new Date().toISOString(),submitted:false,answers:{},questions:chosen.map((v,n)=>{let mode=n%2?"es_to_en":"en_to_es",field=mode=="en_to_es"?"es":"en";return{id:v.id,mode,options:opts(v,field)}})}}
function save(){localStorage.setItem(KEY,JSON.stringify(attempt))}function load(){try{return JSON.parse(localStorage.getItem(KEY))}catch{return null}}function ansCount(){return Object.keys(attempt.answers||{}).length}
function renderQuiz(){let q=attempt.questions[i],v=byId.get(q.id),prompt=q.mode=="en_to_es"?v.en:v.es;show("quiz");who.textContent=attempt.name;count.textContent=(i+1)+" / "+attempt.questions.length;bar.style.width=(ansCount()/attempt.questions.length*100)+"%";icon.textContent=v.icon;kind.textContent=q.mode=="en_to_es"?"Elige en espanol":"Elige en ingles";term.textContent=prompt;optsEl.innerHTML="";q.options.forEach((choice,n)=>{let b=document.createElement("button");b.type="button";b.className="option"+(attempt.answers[q.id]===choice?" selected":"");b.innerHTML='<span class="letter">'+LETTERS[n]+'</span><span>'+choice+'</span>';b.onclick=()=>{attempt.answers[q.id]=choice;save();renderQuiz()};optsEl.appendChild(b)});prev.disabled=i===0;next.disabled=i===attempt.questions.length-1;finish.disabled=ansCount()<attempt.questions.length}
function grade(){let correct=0,detail=attempt.questions.map(q=>{let v=byId.get(q.id),expected=q.mode=="en_to_es"?v.es:v.en,given=attempt.answers[q.id]||"",ok=given===expected;if(ok)correct++;return{id:v.id,en:v.en,es:v.es,given,ok}});attempt.submitted=true;attempt.finishedAt=new Date().toISOString();attempt.score={correct,total:attempt.questions.length,percent:Math.round(correct/attempt.questions.length*100),detail};save();return attempt.score}
function renderResult(){let s=attempt.score||grade(),wrong=s.total-s.correct,date=new Date(attempt.finishedAt||Date.now()).toLocaleString("es-PE",{dateStyle:"short",timeStyle:"short"});show("result");score.textContent=s.correct+"/"+s.total;note.textContent=attempt.name+" - "+date;good.textContent=s.correct;bad.textContent=wrong;pct.textContent=s.percent+"%";review.innerHTML="";s.detail.forEach(r=>{let d=document.createElement("div");d.className="row";d.innerHTML='<span class="mark '+(r.ok?'ok':'bad')+'">'+(r.ok?'OK':'X')+'</span><span><strong>'+r.en+'</strong> = '+r.es+'<br><span class="small">Tu respuesta: '+(r.given||'Sin responder')+'</span></span>';review.appendChild(d)});let wrongIds=s.detail.filter(r=>!r.ok).map(r=>r.id).join(", ")||"ninguna";let msg=["Resultado del examen de Ingles","Alumno: "+attempt.name,"Nota: "+s.correct+"/"+s.total+" ("+s.percent+"%)","Fecha: "+date,"Preguntas incorrectas: "+wrongIds].join("\n");wa.onclick=()=>window.open("https://wa.me/"+TEACHER+"?text="+encodeURIComponent(msg),"_blank","noopener")}
const start=document.getElementById("start"),quiz=document.getElementById("quiz"),result=document.getElementById("result"),nameInput=document.getElementById("name"),startBtn=document.getElementById("startBtn"),contBtn=document.getElementById("contBtn"),optsEl=document.getElementById("opts");
form.onsubmit=e=>{e.preventDefault();let name=nameInput.value.trim();if(!name)return;attempt=make(name);i=0;save();renderQuiz()};contBtn.onclick=()=>{i=0;renderQuiz()};prev.onclick=()=>{i=Math.max(0,i-1);renderQuiz()};next.onclick=()=>{i=Math.min(attempt.questions.length-1,i+1);renderQuiz()};finish.onclick=()=>{if(ansCount()>=attempt.questions.length){grade();renderResult()}};
(function boot(){let p=new URLSearchParams(location.search);if(p.get("docente")==="reiniciar900973658"){localStorage.removeItem(KEY);history.replaceState({},"",location.pathname)}attempt=load();if(!attempt){show("start");return}nameInput.value=attempt.name||"";if(attempt.submitted){renderResult();return}nameInput.disabled=true;startBtn.classList.add("hide");contBtn.classList.remove("hide");show("start")})();
</script>
</body>
</html>
